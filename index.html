<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☬SHΞN™ SSH TUNNEL HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;600;700&display=swap');

        body {
            background-color: #0a0e14;
            background-image: radial-gradient(ellipse at top, #16202d 0%, #0a0e14 80%);
            background-attachment: fixed;
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        #top-loader {
            position: fixed; top: 0; left: 0; height: 3px;
            background: linear-gradient(90deg, #00ffff, #0088ff);
            z-index: 9999; width: 0%; transition: all 1.2s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .glass-panel {
            background: rgba(18, 24, 32, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        .title-font { font-family: 'Orbitron', sans-serif; }
        .subtitle-font { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: 0.1em; }

        /* انیمیشن گرادیانت موجی برای تایتل */
        .animated-gradient {
            background: linear-gradient(270deg, #00ffff, #0088ff, #a855f7, #00ffff);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-wave 4s ease infinite;
            display: inline-block;
        }
        @keyframes gradient-wave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .no-select { user-select: none; -webkit-user-select: none; }

        .copyable {
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
            font-weight: 600;
        }
        .copyable:hover {
            transform: scale(1.03);
            filter: brightness(1.3);
            text-shadow: 0 0 10px currentColor;
        }

        .country-wrapper { cursor: pointer; }
        .country-circle {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .country-wrapper:hover .country-circle {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .country-wrapper.active .country-circle {
            background: rgba(0, 255, 255, 0.12);
            border-color: #00ffff;
            box-shadow: 0 0 18px rgba(0, 255, 255, 0.35);
        }
        .country-wrapper.active .country-label {
            color: #00ffff;
            text-shadow: 0 0 6px rgba(0, 255, 255, 0.6);
        }

        #custom-toast {
            visibility: hidden;
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid #00FFFF;
            color: #ffffff;
            text-align: center;
            border-radius: 8px;
            padding: 12px 24px;
            position: fixed;
            z-index: 9999;
            left: 50%;
            bottom: 20px;
            transform: translate(-50%, 20px);
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        #custom-toast.show {
            visibility: visible;
            opacity: 1;
            transform: translate(-50%, 0);
            bottom: 40px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }

        .status-badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .available { background: rgba(0, 210, 160, 0.15); color: #00d2a0; border: 1px solid rgba(0,210,160,0.3); }
        .full { background: rgba(255,107,107,0.15); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-3 md:p-6 relative">

    <div id="top-loader"></div>

    <header class="w-full max-w-6xl text-center mb-8 mt-4 no-select">
        <h1 class="title-font font-black flex flex-col items-center gap-2">
            <span class="text-4xl sm:text-5xl md:text-6xl animated-gradient tracking-[0.15em] block">☬SHΞN™</span>
            <span class="text-2xl sm:text-3xl md:text-4xl subtitle-font animated-gradient tracking-[0.15em] block mt-1">SSH TUNNEL HUB</span>
        </h1>
        <p class="text-gray-400 text-xs sm:text-sm tracking-[0.2em] uppercase font-bold mt-4">
            Premium SSH Configs For Npv  Husi  SlipNet 
        </p>
    </header>

    <main class="w-full max-w-6xl flex-grow flex flex-col gap-6">
        
        <div class="glass-panel p-6 flex flex-col gap-6 w-full">
            <div class="flex flex-wrap justify-center gap-4 sm:gap-6 md:gap-8" id="country-filters">
                <div class="flex flex-col items-center gap-2 country-wrapper active" data-country="ALL">
                    <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🌐</div>
                    <span class="text-xs font-bold tracking-widest country-label">ALL</span>
                </div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="US"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇺🇸</div><span class="text-xs font-bold tracking-widest country-label">US</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="DE"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇩🇪</div><span class="text-xs font-bold tracking-widest country-label">DE</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="FI"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇫🇮</div><span class="text-xs font-bold tracking-widest country-label">FI</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="GB"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇬🇧</div><span class="text-xs font-bold tracking-widest country-label">GB</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="NL"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇳🇱</div><span class="text-xs font-bold tracking-widest country-label">NL</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="IN"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇮🇳</div><span class="text-xs font-bold tracking-widest country-label">IN</span></div>
                <div class="flex flex-col items-center gap-2 country-wrapper" data-country="FR"><div class="w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center text-3xl country-circle">🇫🇷</div><span class="text-xs font-bold tracking-widest country-label">FR</span></div>
            </div>
        </div>

        <div class="flex justify-between items-center px-2 text-xs font-semibold tracking-wider text-gray-500 uppercase no-select">
            <div class="flex items-center gap-2">
                <span class="relative flex h-2.5 w-2.5">
                  <span id="ping-ring" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span id="ping-dot" class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                </span>
                <span id="status-text">Status:Ready 🛰️</span>
            </div>
            <div class="bg-white/5 px-3 py-1 rounded border border-white/10 text-cyan-400">
                <span id="count-text">0</span> Online SSH TUNNEL
            </div>
        </div>

        <!-- Desktop View -->
        <div class="glass-panel w-full overflow-hidden hidden md:block">
            <table class="w-full text-sm text-left border-collapse">
                <thead class="text-xs text-gray-400 uppercase bg-white/5 border-b border-white/10 no-select tracking-wider">
                    <tr>
                        <th class="px-6 py-5 font-bold">Server</th>
                        <th class="px-6 py-5 font-bold">Host</th>
                        <th class="px-6 py-5 font-bold">Ports</th>
                        <th class="px-6 py-5 font-bold">Features</th>
                        <th class="px-6 py-5 font-bold text-center">Status</th>
                    </tr>
                </thead>
                <tbody id="desktop-list" class="divide-y divide-white/5"></tbody>
            </table>
        </div>

        <!-- Mobile View -->
        <div id="mobile-list" class="grid grid-cols-1 gap-4 md:hidden"></div>
    </main>

    <footer class="w-full max-w-6xl mt-12 mb-6 py-6 border-t border-white/10 text-center no-select">
        <a href="https://t.me/shervini" target="_blank" class="inline-block hover:scale-105 transition-transform">
            <span class="text-gray-500 text-xs sm:text-sm tracking-[0.2em] font-medium">
                Exclusive <span class="text-gray-200 font-bold title-font text-lg ml-1">☬SHΞN™</span> SSH Hub
            </span>
        </a>
    </footer>

    <div id="custom-toast" class="no-select title-font text-lg font-semibold tracking-wider"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('top-loader');
            loader.style.width = '100%';
            setTimeout(() => loader.style.opacity = '0', 1200);
        });

        const countryMap = {
            "United States": "US", "Germany": "DE", "Finland": "FI",
            "United Kingdom": "GB", "Netherlands": "NL", "India": "IN", "France": "FR"
        };
        const flagEmojiMap = {
            "US": "🇺🇸", "DE": "🇩🇪", "FI": "🇫🇮", "GB": "🇬🇧", "NL": "🇳🇱", "IN": "🇮🇳", "FR": "🇫🇷"
        };

        let sshConfigs = [];
        let currentCountry = "ALL";

        let toastTimer;
        function showToast(text) {
            const toast = document.getElementById('custom-toast');
            toast.innerHTML = `<span class="text-cyan-400">Copied:</span> ${text}`;
            toast.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => showToast(text));
        }

        // جایگزینی واژه Free با SHΞN™
        function replaceFree(name) {
            return name.replace(/free/gi, 'SHΞN™');
        }

        function renderConfigs() {
            const desktopBody = document.getElementById('desktop-list');
            const mobileBody = document.getElementById('mobile-list');
            desktopBody.innerHTML = '';
            mobileBody.innerHTML = '';

            const filtered = sshConfigs.filter(c => {
                if (currentCountry === "ALL") return true;
                const code = countryMap[c.country] || null;
                return code === currentCountry;
            });

            document.getElementById('count-text').innerText = filtered.length;

            if (filtered.length === 0) {
                const msg = `<div class="p-8 text-center text-gray-500 col-span-full">No SSH configs found.</div>`;
                desktopBody.innerHTML = `<tr><td colspan="5">${msg}</td></tr>`;
                mobileBody.innerHTML = msg;
                return;
            }

            filtered.forEach(c => {
                const countryCode = countryMap[c.country] || c.country;
                const flagEmoji = flagEmojiMap[countryCode] || '🏳️';
                const serverName = replaceFree(c.name || "SSH Server");
                const host = c.host || "—";
                const ports = c.ports || [];
                const features = c.features || [];
                const status = c.status || "Unknown";
                const statusClass = status === 'Available' ? 'available' : 'full';
                const statusText = status === 'Available' ? 'Available' : 'Full';

                // Desktop row
                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/5 transition-colors border-b border-white/5 last:border-0";
                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-2">
                            <span class="text-xl no-select">${flagEmoji}</span>
                            <span class="font-semibold text-gray-200">${serverName}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="copyable text-cyan-300" onclick="copyText('${host}')">${host}</span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex flex-wrap gap-2">
                            ${ports.map(p => `<span class="copyable bg-white/5 px-2 py-1 rounded text-cyan-300 text-xs font-mono" onclick="copyText('${p}')">${p}</span>`).join('')}
                            ${ports.length === 0 ? '<span class="text-gray-500">—</span>' : ''}
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex flex-wrap gap-1">
                            ${features.map(f => `<span class="bg-white/5 text-gray-400 px-2 py-0.5 rounded text-xs">${f}</span>`).join('')}
                            ${features.length === 0 ? '<span class="text-gray-500">—</span>' : ''}
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </td>
                `;
                desktopBody.appendChild(tr);

                // Mobile card
                const card = document.createElement('div');
                card.className = "glass-panel p-4 flex flex-col gap-3";
                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="text-2xl no-select">${flagEmoji}</span>
                            <span class="font-bold text-gray-200">${serverName}</span>
                        </div>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="flex items-center gap-2 text-sm">
                        <span class="text-gray-400">Host:</span>
                        <span class="copyable text-cyan-300 font-mono" onclick="copyText('${host}')">${host}</span>
                    </div>
                    <div>
                        <span class="text-gray-400 text-sm">Ports:</span>
                        <div class="flex flex-wrap gap-2 mt-1">
                            ${ports.map(p => `<span class="copyable bg-white/5 px-2 py-1 rounded text-cyan-300 text-xs font-mono" onclick="copyText('${p}')">${p}</span>`).join('')}
                            ${ports.length === 0 ? '<span class="text-gray-500 text-xs">—</span>' : ''}
                        </div>
                    </div>
                    <div>
                        <span class="text-gray-400 text-sm">Features:</span>
                        <div class="flex flex-wrap gap-1 mt-1">
                            ${features.map(f => `<span class="bg-white/5 text-gray-400 px-2 py-0.5 rounded text-xs">${f}</span>`).join('')}
                            ${features.length === 0 ? '<span class="text-gray-500 text-xs">—</span>' : ''}
                        </div>
                    </div>
                `;
                mobileBody.appendChild(card);
            });
        }

        document.querySelectorAll('#country-filters .country-wrapper').forEach(wrapper => {
            wrapper.addEventListener('click', () => {
                document.querySelectorAll('#country-filters .country-wrapper').forEach(w => w.classList.remove('active'));
                wrapper.classList.add('active');
                currentCountry = wrapper.getAttribute('data-country');
                renderConfigs();
            });
        });

        async function loadConfigs() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/shervinofpersia/SSH/main/ssh_configs.json?t=' + Date.now());
                if (!res.ok) throw new Error("Failed to fetch");
                sshConfigs = await res.json();
            } catch (e) {
                console.error(e);
                sshConfigs = [];
                document.getElementById('status-text').innerText = 'Error loading data';
            }
            renderConfigs();
        }

        loadConfigs();
    </script>
</body>
</html>
