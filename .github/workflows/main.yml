name: Scrape SSH Configs (Multi-Country)

on:
  schedule:
    - cron: '0 */3 * * *'   # هر 3 ساعت
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape_ssh.py

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ssh_configs.json
          if git diff --cached --quiet; then
            echo "بدون تغییر"
          else
            git commit -m "🔄 بروزرسانی SSH configs ($(date -u +"%Y-%m-%dT%H:%M:%SZ"))"
            git push
          fi
